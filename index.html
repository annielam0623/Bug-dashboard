<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>TripGuru Bug Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <div class="page-header">
      <div>
        <div class="page-title">TripGuru Bug Dashboard</div>
        <div class="page-sub" id="page-sub">数据来自 ClickUp · Bug list · TripGuru-Dev</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
        <button class="refresh-btn" id="refresh-btn" onclick="loadTasks()">刷新数据</button>
      </div>
    </div>

    <div class="stat-row" id="stats">
      <div class="stat"><div class="stat-label">加载中...</div></div>
    </div>

    <div class="status-filter-row" id="status-filter-row"></div>

    <div class="filters">
      <input type="text" id="search" placeholder="搜索 bug 标题、负责人..." oninput="render()">
      <select id="f-severity" onchange="render()">
        <option value="" data-zh="所有优先级" data-en="All Severity">所有优先级</option>
        <option value="P0">P0</option>
        <option value="P1">P1</option>
        <option value="P2">P2</option>
      </select>
      <select id="f-status" onchange="render()">
        <option value="" data-zh="所有状态" data-en="All Status">所有状态</option>
        <option value="new" data-zh="新建" data-en="New">新建</option>
        <option value="in progress" data-zh="进行中" data-en="In Progress">进行中</option>
        <option value="complete" data-zh="已完成" data-en="Complete">已完成</option>
      </select>
      <select id="f-reason" onchange="render()">
        <option value="" data-zh="所有原因" data-en="All Reasons">所有原因</option>
        <option value="需求不明确" data-zh="需求不明确" data-en="Unclear Requirements">需求不明确</option>
        <option value="UI问题" data-zh="UI问题" data-en="UI Issue">UI问题</option>
        <option value="优化建议" data-zh="优化建议" data-en="Optimization">优化建议</option>
        <option value="逻辑错误" data-zh="逻辑错误" data-en="Logic Error">逻辑错误</option>
        <option value="功能缺失" data-zh="功能缺失" data-en="Missing Feature">功能缺失</option>
        <option value="数据问题" data-zh="数据问题" data-en="Data Issue">数据问题</option>
        <option value="兼容性问题" data-zh="兼容性问题" data-en="Compatibility">兼容性问题</option>
        <option value="测试遗漏" data-zh="测试遗漏" data-en="Test Gap">测试遗漏</option>
        <option value="环境与部署问题" data-zh="环境与部署问题" data-en="Env / Deploy">环境与部署问题</option>
      </select>
      <select id="f-assignee" onchange="render()">
        <option value="" data-zh="所有负责人" data-en="All Assignees">所有负责人</option>
      </select>
      <select id="f-sort" onchange="render()">
        <option value="priority" data-zh="优先级（默认）" data-en="Priority (default)">优先级（默认）</option>
        <option value="days-desc" data-zh="天数最多优先" data-en="Oldest First">天数最多优先</option>
        <option value="updated-desc" data-zh="最新动态优先" data-en="Recently Updated">最新动态优先</option>
      </select>
    </div>

    <div id="bug-list">
      <div class="loading">正在从 ClickUp 拉取数据...</div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
