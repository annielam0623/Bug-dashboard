<!DOCTYPE html>
<html lang="zh">

<head>
      <meta charset="UTF-8">
      <title>TripGuru Bug Dashboard</title>
      <style>
            * {
                  box-sizing: border-box;
                  margin: 0;
                  padding: 0;
            }

            body {
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  background: #f8fafc;
                  color: #0f172a;
                  font-size: 14px;
            }

            .app {
                  max-width: 1200px;
                  margin: 0 auto;
                  padding: 24px 16px;
            }

            .page-header {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 20px;
            }

            .page-title {
                  font-size: 20px;
                  font-weight: 700;
            }

            .page-sub {
                  font-size: 13px;
                  color: #64748b;
                  margin-top: 2px;
            }

            .stat-row {
                  display: grid;
                  grid-template-columns: repeat(6, 1fr);
                  gap: 10px;
                  margin-bottom: 20px;
            }

            .stat {
                  background: #fff;
                  border: 1px solid #e2e8f0;
                  border-radius: 12px;
                  padding: 14px 16px;
            }

            .stat-label {
                  font-size: 11px;
                  color: #64748b;
                  margin-bottom: 4px;
            }

            .stat-val {
                  font-size: 22px;
                  font-weight: 700;
            }

            .status-filter-row {
                  display: flex;
                  gap: 8px;
                  flex-wrap: wrap;
                  margin-bottom: 16px;
            }

            .sf-btn {
                  padding: 8px 16px;
                  border: 1px solid #e2e8f0;
                  border-radius: 10px;
                  background: #fff;
                  color: #64748b;
                  font-size: 13px;
                  cursor: pointer;
                  font-weight: 500;
            }

            .sf-btn:hover {
                  border-color: #94a3b8;
                  color: #0f172a;
            }

            .sf-btn.active {
                  background: #0f172a;
                  color: #fff;
                  border-color: #0f172a;
            }

            .sf-count {
                  font-size: 11px;
                  background: rgba(0, 0, 0, 0.08);
                  padding: 1px 6px;
                  border-radius: 20px;
                  margin-left: 4px;
            }

            .sf-btn.active .sf-count {
                  background: rgba(255, 255, 255, 0.2);
            }

            .filters {
                  background: #fff;
                  border: 1px solid #e2e8f0;
                  border-radius: 12px;
                  padding: 12px 16px;
                  margin-bottom: 16px;
                  display: flex;
                  gap: 10px;
                  flex-wrap: wrap;
                  align-items: center;
            }

            input,
            select {
                  padding: 6px 10px;
                  border: 1px solid #e2e8f0;
                  border-radius: 8px;
                  font-size: 13px;
                  outline: none;
                  background: #fff;
            }

            input {
                  width: 260px;
            }

            .count {
                  font-size: 13px;
                  color: #64748b;
                  margin-bottom: 10px;
            }

            .loading {
                  text-align: center;
                  padding: 48px;
                  color: #94a3b8;
                  font-size: 14px;
            }

            .error {
                  text-align: center;
                  padding: 48px;
                  color: #ef4444;
                  font-size: 14px;
            }

            .refresh-btn {
                  padding: 6px 14px;
                  background: #0f172a;
                  color: #fff;
                  border: none;
                  border-radius: 8px;
                  cursor: pointer;
                  font-size: 13px;
            }

            .refresh-btn:hover {
                  background: #1e293b;
            }

            /* bug card — single column, no grid */
            .bug-card {
                  background: #fff;
                  border: 1px solid #e2e8f0;
                  border-radius: 14px;
                  padding: 16px;
                  margin-bottom: 10px;
            }

            .bug-card:hover {
                  border-color: #94a3b8;
            }

            .bug-summary {
                  cursor: pointer;
            }

            .bug-badges {
                  display: flex;
                  gap: 6px;
                  flex-wrap: wrap;
                  margin-bottom: 6px;
            }

            .badge {
                  font-size: 11px;
                  font-weight: 500;
                  padding: 2px 8px;
                  border-radius: 20px;
                  border: 1px solid transparent;
            }

            .b-p0 {
                  background: #fee2e2;
                  color: #991b1b;
                  border-color: #fca5a5;
            }

            .b-p1 {
                  background: #ffedd5;
                  color: #9a3412;
                  border-color: #fdba74;
            }

            .b-p2 {
                  background: #dbeafe;
                  color: #1e40af;
                  border-color: #93c5fd;
            }

            .b-p3 {
                  background: #f1f5f9;
                  color: #475569;
                  border-color: #cbd5e1;
            }

            .b-new {
                  background: #f1f5f9;
                  color: #475569;
                  border-color: #e2e8f0;
            }

            .b-open {
                  background: #fef3c7;
                  color: #92400e;
                  border-color: #fde68a;
            }

            .b-prog {
                  background: #e0f2fe;
                  color: #075985;
                  border-color: #7dd3fc;
            }

            .b-done {
                  background: #dcfce7;
                  color: #166534;
                  border-color: #86efac;
            }

            .b-closed {
                  background: #f0fdf4;
                  color: #15803d;
                  border-color: #bbf7d0;
            }

            .b-reason {
                  background: #f5f3ff;
                  color: #5b21b6;
                  border-color: #c4b5fd;
            }

            .bug-title {
                  font-size: 14px;
                  font-weight: 600;
                  color: #0f172a;
                  margin-bottom: 6px;
                  line-height: 1.4;
            }

            .bug-meta {
                  font-size: 12px;
                  color: #64748b;
                  display: flex;
                  gap: 12px;
                  flex-wrap: wrap;
                  align-items: center;
            }

            .assignees {
                  display: flex;
                  gap: 3px;
                  align-items: center;
            }

            .avatar {
                  width: 22px;
                  height: 22px;
                  border-radius: 50%;
                  object-fit: cover;
                  border: 1px solid #e2e8f0;
            }

            .avatar-placeholder {
                  width: 22px;
                  height: 22px;
                  border-radius: 50%;
                  background: #e2e8f0;
                  display: inline-flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 9px;
                  font-weight: 600;
                  color: #64748b;
            }

            .bug-link {
                  font-size: 11px;
                  color: #2563eb;
                  text-decoration: none;
            }

            .bug-link:hover {
                  text-decoration: underline;
            }

            .days-badge {
                  font-size: 11px;
                  padding: 2px 7px;
                  border-radius: 20px;
                  background: #fef9c3;
                  color: #854d0e;
                  border: 1px solid #fde047;
            }

            .days-urgent {
                  background: #fee2e2;
                  color: #991b1b;
                  border-color: #fca5a5;
            }

            /* expand panel — side by side */
            .expand-panel {
                  display: none;
                  margin-top: 16px;
                  padding-top: 16px;
                  border-top: 2px solid #f1f5f9;
            }

            .expand-grid {
                  display: grid;
                  grid-template-columns: 1fr 280px;
                  gap: 16px;
                  align-items: start;
                  min-width: 0;
            }

            /* history col */
            .panel-label {
                  font-size: 11px;
                  font-weight: 600;
                  color: #64748b;
                  text-transform: uppercase;
                  letter-spacing: .05em;
                  margin-bottom: 10px;
            }

            .comments-scroll {
                  display: flex;
                  gap: 10px;
                  overflow-x: auto;
                  padding-bottom: 8px;
                  min-width: 0;
            }

            .comment-card {
                  border: 1px solid #e2e8f0;
                  border-radius: 8px;
                  padding: 10px 12px;
                  min-width: 200px;
                  max-width: 200px;
                  max-height: 180px;
                  overflow-y: auto;
                  flex-shrink: 0;
                  background: #fafafa;
            }

            .comment-header {
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  margin-bottom: 6px;
            }

            .comment-user {
                  font-weight: 600;
                  font-size: 12px;
                  color: #0f172a;
            }

            .comment-date {
                  font-size: 11px;
                  color: #94a3b8;
                  margin-left: auto;
            }

            .comment-body {
                  font-size: 12px;
                  color: #334155;
                  white-space: pre-wrap;
                  line-height: 1.6;
            }

            /* form col */
            .form-col {
                  background: #f8fafc;
                  border: 1px solid #e2e8f0;
                  border-radius: 10px;
                  padding: 12px;
            }

            .form-col .panel-label {
                  margin-bottom: 8px;
            }

            .field-label {
                  font-size: 11px;
                  color: #64748b;
                  margin-bottom: 3px;
            }

            .field-wrap {
                  margin-bottom: 8px;
            }

            .field-wrap select,
            .field-wrap textarea {
                  width: 100%;
                  padding: 6px 8px;
                  border: 1px solid #e2e8f0;
                  border-radius: 6px;
                  font-size: 12px;
                  font-family: inherit;
                  background: #fff;
                  color: #0f172a;
            }

            .field-wrap textarea {
                  resize: vertical;
                  min-height: 44px;
            }

            .submit-btn {
                  width: 100%;
                  padding: 8px;
                  background: #0f172a;
                  color: #fff;
                  border: none;
                  border-radius: 6px;
                  cursor: pointer;
                  font-size: 13px;
                  font-weight: 500;
            }

            .submit-btn:hover {
                  background: #1e293b;
            }

            .success-msg {
                  font-size: 12px;
                  color: #16a34a;
                  margin-top: 6px;
                  display: none;
            }
      </style>
</head>

<body>
      <div class="app">
            <div class="page-header">
                  <div>
                        <div class="page-title">TripGuru Bug Dashboard</div>
                        <div class="page-sub">数据来自 ClickUp · Bug list · TripGuru-Dev</div>
                  </div>
                  <button class="refresh-btn" onclick="loadTasks()">刷新数据</button>
            </div>

            <div class="stat-row" id="stats">
                  <div class="stat">
                        <div class="stat-label">加载中...</div>
                  </div>
            </div>
            <div class="status-filter-row" id="status-filter-row"></div>
            <div class="filters">
                  <input type="text" id="search" placeholder="搜索 bug 标题、负责人..." oninput="render()">
                  <select id="f-severity" onchange="render()">
                        <option value="">所有优先级</option>
                        <option value="P0">P0</option>
                        <option value="P1">P1</option>
                        <option value="P2">P2</option>
                  </select>
                  <select id="f-status" onchange="render()">
                        <option value="">所有状态</option>
                        <option value="new">新建</option>
                        <option value="in progress">进行中</option>
                        <option value="complete">已完成</option>
                  </select>
                  <select id="f-reason" onchange="render()">
                        <option value="">所有原因</option>
                        <option value="需求不明确">需求不明确</option>
                        <option value="UI问题">UI问题</option>
                        <option value="优化建议">优化建议</option>
                        <option value="逻辑错误">逻辑错误</option>
                        <option value="功能缺失">功能缺失</option>
                        <option value="数据问题">数据问题</option>
                        <option value="兼容性问题">兼容性问题</option>
                        <option value="测试遗漏">测试遗漏</option>
                        <option value="环境与部署问题">环境与部署问题</option>
                  </select>
                  <select id="f-assignee" onchange="render()">
                        <option value="">所有负责人</option>
                  </select>
            </div>

            <div id="bug-list">
                  <div class="loading">正在从 ClickUp 拉取数据...</div>
            </div>
      </div>

      <script>
            let allTasks = [];

            function getSeverity(task) {
                  const f = task.custom_fields?.find(f => f.name === 'Bug Severity');
                  if (!f || !f.value) return null;
                  const opt = f.type_config?.options?.find(o => o.orderindex === f.value || o.id === f.value);
                  return opt?.name || null;
            }

            function getReason(task) {
                  const f = task.custom_fields?.find(f => f.name === 'Bug原因');
                  if (!f || !f.value) return null;
                  const opt = f.type_config?.options?.find(o => o.orderindex === f.value || o.id === f.value);
                  return opt?.name || null;
            }

            function daysAgo(ts) {
                  return Math.floor((Date.now() - parseInt(ts)) / 86400000);
            }

            function severityClass(s) {
                  return s === 'P0' ? 'b-p0' : s === 'P1' ? 'b-p1' : s === 'P2' ? 'b-p2' : 'b-p3';
            }
            function setStatusFilter(val, btn) {
                  document.querySelectorAll('.sf-btn').forEach(b => b.classList.remove('active'));
                  btn.classList.add('active');
                  document.getElementById('f-status').value = val;
                  render();
            }
            function statusClass(s) {
                  const sl = (s || '').toLowerCase();
                  if (sl.includes('new') || sl.includes('新建')) return 'b-new';
                  if (sl.includes('progress') || sl.includes('进行')) return 'b-prog';
                  if (sl.includes('complete') || sl.includes('上线') || sl.includes('done')) return 'b-closed';
                  if (sl.includes('fixed') || sl.includes('passed')) return 'b-done';
                  return 'b-open';
            }

            function renderStats(tasks) {
                  const active = tasks.filter(t => !['closed', 'complete'].includes(t.status?.type));
                  const p0 = tasks.filter(t => getSeverity(t) === 'P0').length;
                  const p1 = tasks.filter(t => getSeverity(t) === 'P1').length;
                  const p2 = tasks.filter(t => getSeverity(t) === 'P2').length;
                  const noOwner = active.filter(t => t.assignees?.length === 0).length;
                  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">全部 Bug</div><div class="stat-val">${tasks.length}</div></div>
    <div class="stat"><div class="stat-label">未关闭</div><div class="stat-val" style="color:#0369a1">${active.length}</div></div>
    <div class="stat"><div class="stat-label">P0</div><div class="stat-val" style="color:#dc2626">${p0}</div></div>
    <div class="stat"><div class="stat-label">P1</div><div class="stat-val" style="color:#ea580c">${p1}</div></div>
    <div class="stat"><div class="stat-label">P2</div><div class="stat-val" style="color:#2563eb">${p2}</div></div>
    <div class="stat"><div class="stat-label">无负责人</div><div class="stat-val" style="color:#9333ea">${noOwner}</div></div>`;
                  const statusMap = [
                        { val: 'new', label: '新建' },
                        { val: 'open', label: '已确认为BUG' },
                        { val: 'in progress', label: '修复中' },
                        { val: 'fixed', label: '已修复待测试' },
                        { val: 'in verification', label: '验证中' },
                        { val: 'test passed', label: 'TEST验证通过' },
                        { val: 'complete', label: '已上线' },
                        { val: '已拒绝', label: '已拒绝' },
                  ];

                  const total = tasks.length;
                  document.getElementById('status-filter-row').innerHTML =
                        `<button class="sf-btn active" onclick="setStatusFilter('',this)">全部 <span class="sf-count">${total}</span></button>` +
                        statusMap.map(s => {
                              const count = tasks.filter(t => (t.status?.status || '').toLowerCase().includes(s.val.toLowerCase())).length;
                              return `<button class="sf-btn" onclick="setStatusFilter('${s.val}',this)">${s.label} <span class="sf-count">${count}</span></button>`;
                        }).join('');
            }

            function populateAssignees(tasks) {
                  const names = new Set();
                  tasks.forEach(t => t.assignees?.forEach(a => names.add(a.username)));
                  const sel = document.getElementById('f-assignee');
                  [...names].sort().forEach(name => {
                        const opt = document.createElement('option');
                        opt.value = name; opt.textContent = name;
                        sel.appendChild(opt);
                  });
            }

            function render() {
                  const search = document.getElementById('search').value.toLowerCase();
                  const fSev = document.getElementById('f-severity').value;
                  const fStatus = document.getElementById('f-status').value;
                  const fReason = document.getElementById('f-reason').value;
                  const fAssignee = document.getElementById('f-assignee').value;

                  const filtered = allTasks.filter(t => {
                        const sev = getSeverity(t);
                        const reason = getReason(t);
                        const statusStr = (t.status?.status || '').toLowerCase();
                        const assigneeNames = t.assignees?.map(a => a.username).join(' ') || '';
                        const matchText = !search || t.name.toLowerCase().includes(search) || assigneeNames.toLowerCase().includes(search);
                        return matchText
                              && (!fSev || sev === fSev)
                              && (!fStatus || statusStr.includes(fStatus))
                              && (!fReason || reason === fReason)
                              && (!fAssignee || assigneeNames.includes(fAssignee));
                  });
                  <select id="f-sort" onchange="render()">
                        <option value="priority">优先级（默认）</option>
                        <option value="days-desc">天数最多优先</option>
                        <option value="updated-desc">最新动态优先</option>
                  </select>

                  const sortBy = document.getElementById('f-sort').value;
                  const sevOrder = { P0: 0, P1: 1, P2: 2, P3: 3 };

                  filtered.sort((a, b) => {
                        const aDone = (a.status?.type === 'closed' || (a.status?.status || '').includes('已拒绝')) ? 1 : 0;
                        const bDone = (b.status?.type === 'closed' || (b.status?.status || '').includes('已拒绝')) ? 1 : 0;
                        if (aDone !== bDone) return aDone - bDone;

                        if (sortBy === 'days-desc') {
                              return parseInt(a.date_created) - parseInt(b.date_created);
                        }
                        if (sortBy === 'updated-desc') {
                              return parseInt(b.date_updated) - parseInt(a.date_updated);
                        }
                        const sa = sevOrder[getSeverity(a)] ?? 4;
                        const sb = sevOrder[getSeverity(b)] ?? 4;
                        if (sa !== sb) return sa - sb;
                        return parseInt(b.date_created) - parseInt(a.date_created);
                  });

                  renderStats(allTasks);

                  const el = document.getElementById('bug-list');
                  if (!filtered.length) {
                        el.innerHTML = '<div class="loading">没有符合条件的 bug</div>';
                        return;
                  }

                  el.innerHTML = `<div class="count">显示 ${filtered.length} / ${allTasks.length} 条</div>` +
                        filtered.map(task => {
                              const sev = getSeverity(task);
                              const reason = getReason(task);
                              const days = daysAgo(task.date_created);
                              const isUrgent = days > 7 && task.status?.type !== 'closed';
                              const assignees = task.assignees || [];

                              const avatarsHtml = assignees.length
                                    ? assignees.map(a => a.profilePicture
                                          ? `<img class="avatar" src="${a.profilePicture}" title="${a.username}">`
                                          : `<span class="avatar-placeholder" title="${a.username}">${a.initials || a.username[0]}</span>`
                                    ).join('')
                                    : '<span style="font-size:12px;color:#94a3b8;">无负责人</span>';

                              const assigneeText = assignees.map(a => `<span style="font-size:12px">${a.username}</span>`).join('、');

                              return `
<div class="bug-card" id="card-${task.id}">
  <div class="bug-summary" onclick="toggleExpand('${task.id}')">
    <div class="bug-badges">
      ${sev ? `<span class="badge ${severityClass(sev)}">${sev}</span>` : ''}
      <span class="badge ${statusClass(task.status?.status)}">${task.status?.status || '—'}</span>
      ${reason ? `<span class="badge b-reason">${reason}</span>` : ''}
    </div>
    <div class="bug-title">${task.name}</div>
    <div class="bug-meta">
      <div class="assignees">${avatarsHtml}${assigneeText}</div>
      <span>创建: ${new Date(parseInt(task.date_created)).toLocaleDateString('zh-CN')}</span>
      <span class="days-badge ${isUrgent ? 'days-urgent' : ''}">已 ${days} 天</span>
      <a class="bug-link" href="${task.url}" target="_blank" onclick="event.stopPropagation()">在 ClickUp 查看 ↗</a>
    </div>
  </div>

  <div class="expand-panel" id="expand-${task.id}">
    <div class="expand-grid">

      <!-- 左：历史日报 横向滚动 -->
      <div>
        <div class="panel-label">历史日报</div>
        <div class="comments-scroll" id="comments-${task.id}">
          <span style="font-size:13px;color:#94a3b8;">加载中...</span>
        </div>
      </div>

      <!-- 右：填报表单 固定宽度 -->
      <div class="form-col">
        <div class="panel-label">提交今日日报</div>
        <div class="field-wrap">
          <div class="field-label">姓名</div>
          <select id="member-${task.id}">
            <option value="">— 选择 —</option>
            <option>liucai</option>
            <option>LiAng Lu</option>
            <option>YangMingqin</option>
            <option>Eric</option>
            <option>lili</option>
            <option>Liyumeng</option>
            <option>Echo Pang</option>
            <option>Lily Wang</option>
          </select>
        </div>
        <div class="field-wrap">
          <div class="field-label">昨日进展</div>
          <textarea id="prog-${task.id}" placeholder="昨天完成了什么？"></textarea>
        </div>
        <div class="field-wrap">
          <div class="field-label">卡点</div>
          <textarea id="block-${task.id}" placeholder="遇到什么阻碍？"></textarea>
        </div>
        <div class="field-wrap">
          <div class="field-label">今日计划 *</div>
          <textarea id="today-${task.id}" placeholder="今天打算做什么？"></textarea>
        </div>
        <div class="field-wrap">
          <div class="field-label">明日计划</div>
          <textarea id="tomorrow-${task.id}" placeholder="明天打算做什么？"></textarea>
        </div>
        <button class="submit-btn" onclick="submitLog('${task.id}')">提交日报</button>
        <div class="success-msg" id="msg-${task.id}">✓ 已提交到 ClickUp</div>
      </div>

    </div>
  </div>
</div>`;
                        }).join('');
            }

            async function toggleExpand(taskId) {
                  const panel = document.getElementById(`expand-${taskId}`);
                  const isOpen = panel.style.display === 'block';
                  panel.style.display = isOpen ? 'none' : 'block';
                  if (!isOpen) loadComments(taskId);
            }

            async function loadComments(taskId) {
                  const el = document.getElementById(`comments-${taskId}`);
                  el.innerHTML = '<span style="font-size:13px;color:#94a3b8;">加载中...</span>';
                  try {
                        const res = await fetch(`http://localhost:3001/api/task/${taskId}/comment`);
                        const data = await res.json();
                        const comments = data.comments || [];
                        if (!comments.length) {
                              el.innerHTML = '<span style="font-size:13px;color:#94a3b8;">暂无日报记录</span>';
                              return;
                        }
                        el.innerHTML = comments.map(c => {
                              const isLog = c.comment_text?.startsWith('📅');
                              return `
    <div class="comment-card" style="${isLog ? 'border-color:#86efac;background:#f0fdf4;' : ''}">
      <div class="comment-header">
        ${c.user?.profilePicture ? `<img src="${c.user.profilePicture}" style="width:18px;height:18px;border-radius:50%;">` : ''}
        <span class="comment-user">${c.user?.username || '—'}</span>
        ${isLog ? '<span style="font-size:10px;background:#dcfce7;color:#166534;padding:1px 6px;border-radius:20px;border:1px solid #86efac;">日报</span>' : ''}
        <span class="comment-date">${new Date(parseInt(c.date)).toLocaleDateString('zh-CN')}</span>
      </div>
      <div class="comment-body">${c.comment_text}</div>
    </div>`;
                        }).join('');
                  } catch (e) {
                        el.innerHTML = '<span style="color:#ef4444;font-size:13px;">加载失败</span>';
                  }
            }

            async function submitLog(taskId) {
                  const member = document.getElementById(`member-${taskId}`).value;
                  const today = document.getElementById(`today-${taskId}`).value.trim();
                  if (!member) { alert('请选择姓名'); return; }
                  if (!today) { alert('请填写今日计划'); return; }

                  const prog = document.getElementById(`prog-${taskId}`).value.trim();
                  const block = document.getElementById(`block-${taskId}`).value.trim();
                  const tomorrow = document.getElementById(`tomorrow-${taskId}`).value.trim();
                  const date = new Date().toLocaleDateString('zh-CN');

                  const text = `📅 ${date} | ${member}
━━━━━━━━━━━━━━━━
昨日进展：${prog || '—'}
卡点：${block || '—'}
今日计划：${today}
明日计划：${tomorrow || '—'}`;

                  try {
                        await fetch(`http://localhost:3001/api/task/${taskId}/comment`, {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ comment_text: text })
                        });
                        const msg = document.getElementById(`msg-${taskId}`);
                        msg.style.display = 'block';
                        ['member', 'prog', 'block', 'today', 'tomorrow'].forEach(f => {
                              document.getElementById(`${f}-${taskId}`).value = '';
                        });
                        setTimeout(() => {
                              msg.style.display = 'none';
                              loadComments(taskId);
                        }, 1500);
                  } catch (e) {
                        alert('提交失败：' + e.message);
                  }
            }

            async function loadTasks() {
                  document.getElementById('bug-list').innerHTML = '<div class="loading">正在从 ClickUp 拉取数据...</div>';
                  try {
                        const res = await fetch('http://localhost:3001/api/tasks');
                        const data = await res.json();
                        allTasks = data.tasks || [];
                        populateAssignees(allTasks);
                        render();
                  } catch (e) {
                        document.getElementById('bug-list').innerHTML = `<div class="error">连接失败，请确认 server.js 正在运行<br><small>${e.message}</small></div>`;
                  }
            }

            loadTasks();
      </script>
</body>

</html>
